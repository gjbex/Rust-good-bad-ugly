name: Build training site assets

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site and Quarto slides
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: python -m pip install mkdocs

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build learning-module site
        run: mkdocs build --strict --site-dir "$PWD/docs/learning-modules-site"

      - name: Build slide deck
        run: |
          quarto render slides-source/rust-good-bad-ugly.qmd --to revealjs --output-dir "$RUNNER_TEMP/slides"
          mkdir -p docs/slides
          cp -R "$RUNNER_TEMP/slides/." docs/slides/

      - name: Commit generated assets
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/learning-modules-site docs/slides
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
          else
            git commit -m "Build generated training site assets [skip ci]"
            git push
          fi
