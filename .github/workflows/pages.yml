name: Publish training site

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site and Quarto slides
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: python -m pip install mkdocs

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: pages

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build landing page
        env:
          PAGES_REPO_NWO: ${{ github.repository }}
        run: |
          mkdir -p "$RUNNER_TEMP/landing"
          sed "s#{{GITHUB_REPOSITORY}}#${GITHUB_REPOSITORY}#g" pages/README.md > "$RUNNER_TEMP/landing/README.md"
          cp pages/_config.yml "$RUNNER_TEMP/landing/_config.yml"
          cp pages/Gemfile "$RUNNER_TEMP/landing/Gemfile"
          cd "$RUNNER_TEMP/landing"
          bundle install
          bundle exec jekyll build --destination "$GITHUB_WORKSPACE/_site"

      - name: Build learning-module site
        run: mkdocs build --strict --site-dir "$PWD/_site/learning-modules"

      - name: Build slide deck
        run: |
          quarto render slides-source/rust-good-bad-ugly.qmd --to revealjs --output-dir "$RUNNER_TEMP/slides"
          mkdir -p _site/slides
          cp -R "$RUNNER_TEMP/slides/." _site/slides/

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
